<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — 회원가입</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm">

    <!-- 로고 -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-teal-600">TaskFlow</h1>
      <p class="text-sm text-gray-500 mt-1">팀 업무를 한 화면에서</p>
    </div>

    <!-- 회원가입 카드 -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">

      <h2 class="text-lg font-semibold text-gray-800 mb-6">회원가입</h2>

      <!-- 이메일 -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
        <input
          type="email"
          placeholder="name@example.com"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent"
        >
      </div>

      <!-- 비밀번호 -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
        <input
          type="password"
          placeholder="8자 이상, 대문자·소문자·특수문자 포함"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent"
        >
        <p class="text-xs text-gray-400 mt-1">대문자, 소문자, 특수문자(!@#$% 등) 각 1자 이상</p>
      </div>

      <!-- 비밀번호 확인 -->
      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호 확인</label>
        <input
          type="password"
          placeholder="비밀번호 재입력"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent"
        >
      </div>

      <!-- 가입 버튼 -->
      <button class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
        가입하기
      </button>

      <!-- 에러 메시지 (숨김 상태) -->
      <div class="hidden mt-3 text-sm text-red-600 text-center">
        이미 사용 중인 이메일입니다.
      </div>

      <!-- 구분선 -->
      <div class="my-5 border-t border-gray-100"></div>

      <!-- 로그인 링크 -->
      <p class="text-center text-sm text-gray-500">
        이미 계정이 있으신가요?
        <a href="login.html" class="text-teal-600 font-medium hover:underline">로그인</a>
      </p>

    </div>
  </div>

</body>
</html>
