<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — 회원가입</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-teal-600">TaskFlow</h1>
      <p class="text-sm text-gray-500 mt-1">팀 업무를 한 화면에서</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      <h2 class="text-lg font-semibold text-gray-800 mb-6">회원가입</h2>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
        <input id="email" type="email" placeholder="name@example.com"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent">
      </div>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
        <input id="password" type="password" placeholder="8자 이상, 대문자·소문자·특수문자 포함"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent">
        <p class="text-xs text-gray-400 mt-1">대문자, 소문자, 특수문자(!@#$% 등) 각 1자 이상</p>
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호 확인</label>
        <input id="password2" type="password" placeholder="비밀번호 재입력"
          class="w-full px-4 py-2.5 rounded-lg border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent">
      </div>

      <button id="submitBtn"
        class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors">
        가입하기
      </button>

      <div id="errorMsg" class="hidden mt-3 text-sm text-red-600 text-center"></div>

      <div class="my-5 border-t border-gray-100"></div>

      <p class="text-center text-sm text-gray-500">
        이미 계정이 있으신가요?
        <a href="/static/login.html" class="text-teal-600 font-medium hover:underline">로그인</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { setToken, setTeam } from "./js/api.js";

    const btn = document.getElementById("submitBtn");
    const errorMsg = document.getElementById("errorMsg");

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove("hidden");
    }

    btn.addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const password2 = document.getElementById("password2").value;

      errorMsg.classList.add("hidden");

      if (!email || !password) {
        showError("이메일과 비밀번호를 입력해주세요.");
        return;
      }
      if (password !== password2) {
        showError("비밀번호가 일치하지 않습니다.");
        return;
      }

      btn.textContent = "처리 중...";
      btn.disabled = true;

      try {
        const res = await fetch("/auth/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data?.detail?.error?.message || "회원가입에 실패했습니다.");
          return;
        }
        setToken(data.token);
        window.location.href = "/static/team.html";
      } catch {
        showError("서버 연결에 실패했습니다.");
      } finally {
        btn.textContent = "가입하기";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
