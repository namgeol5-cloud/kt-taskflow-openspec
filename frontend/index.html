<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .tab-btn.active { background: #0d9488; color: #fff; }
    .tab-btn { transition: background 0.15s, color 0.15s; }
    .filter-btn.active { background: #1f2937; color: #fff; }
    .task-card.dragging { opacity: 0.35; }
    .kanban-col.drag-over { outline: 2px dashed #0d9488; }
    .drop-hint { display: none; }
    .kanban-col.drag-over .drop-hint { display: flex; }
  </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

  <!-- 헤더 -->
  <header class="bg-white border-b border-gray-100 px-6 h-14 flex items-center justify-between flex-shrink-0">
    <div class="flex items-center gap-3 min-w-[160px]">
      <span class="text-lg font-bold text-teal-600">TaskFlow</span>
      <span id="teamName" class="text-sm text-gray-500"></span>
    </div>

    <div class="flex items-center border border-gray-200 rounded-lg overflow-hidden">
      <button class="tab-btn active text-sm font-medium px-5 py-1.5" data-tab="kanban">칸반</button>
      <button class="tab-btn text-sm font-medium px-5 py-1.5 text-gray-500 hover:bg-gray-50" data-tab="chat">채팅</button>
      <button class="tab-btn text-sm font-medium px-5 py-1.5 text-gray-500 hover:bg-gray-50" data-tab="member">멤버</button>
    </div>

    <div class="flex items-center gap-3 min-w-[160px] justify-end">
      <span id="userEmail" class="text-xs text-gray-400"></span>
      <a href="/static/team.html" class="text-xs text-gray-400 hover:text-gray-600">팀 변경</a>
    </div>
  </header>

  <!-- 칸반 탭 -->
  <section id="tab-kanban" class="flex-1 flex flex-col overflow-hidden">

    <!-- 필터 바 -->
    <div class="bg-white border-b border-gray-100 px-6 py-2 flex items-center justify-between flex-shrink-0">
      <div class="flex items-center gap-1">
        <button class="filter-btn active text-xs font-medium px-3 py-1.5 rounded-md" data-filter="all">전체</button>
        <button class="filter-btn text-xs font-medium px-3 py-1.5 rounded-md text-gray-500 hover:bg-gray-100" data-filter="me">@me</button>
        <button class="filter-btn text-xs font-medium px-3 py-1.5 rounded-md text-gray-500 hover:bg-gray-100" data-filter="unassigned">미할당</button>
      </div>
      <div class="flex items-center gap-1 text-xs text-gray-400">
        <span>정렬:</span>
        <button class="hover:text-gray-600 font-medium">최근 생성순 ▾</button>
      </div>
    </div>

    <!-- 3컬럼 칸반 보드 -->
    <div class="flex-1 flex gap-4 p-4 overflow-hidden">

      <!-- TODO -->
      <div class="kanban-col flex-1 flex flex-col min-w-0 rounded-xl overflow-hidden" data-status="TODO">
        <div class="bg-yellow-50 border border-yellow-100 rounded-t-xl px-4 py-2.5 flex items-center justify-between flex-shrink-0">
          <span class="text-sm font-bold text-yellow-700">TODO &nbsp;·&nbsp; <span id="count-TODO">0</span></span>
          <button class="text-yellow-500 hover:text-yellow-700 font-bold text-lg leading-none add-col-btn" data-col="TODO">+</button>
        </div>
        <div class="flex-1 bg-yellow-50/40 border border-t-0 border-yellow-100 rounded-b-xl p-2.5 overflow-y-auto space-y-2" id="col-TODO"
             ondragover="colDragOver(event)" ondragleave="colDragLeave(event)" ondrop="colDrop(event,'TODO')">
          <div id="add-form-TODO" class="hidden bg-white border-2 border-teal-400 rounded-lg p-2.5 space-y-2">
            <input id="add-title-TODO" type="text" placeholder="태스크 제목" class="w-full text-sm outline-none">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-1 text-xs text-teal-600">
                <span>담당자:</span>
                <span id="add-me-hint-TODO" class="font-medium">@me ▾</span>
              </div>
              <span class="text-xs text-gray-400">Enter 저장 · Esc 취소</span>
            </div>
          </div>
          <div class="drop-hint h-12 items-center justify-center border-2 border-dashed border-teal-300 rounded-lg text-teal-400 text-sm gap-1">↓ 여기에 놓기</div>
        </div>
      </div>

      <!-- DOING -->
      <div class="kanban-col flex-1 flex flex-col min-w-0 rounded-xl overflow-hidden" data-status="DOING">
        <div class="bg-blue-50 border border-blue-100 rounded-t-xl px-4 py-2.5 flex items-center justify-between flex-shrink-0">
          <span class="text-sm font-bold text-blue-700">DOING &nbsp;·&nbsp; <span id="count-DOING">0</span></span>
          <button class="text-blue-400 hover:text-blue-600 font-bold text-lg leading-none add-col-btn" data-col="DOING">+</button>
        </div>
        <div class="flex-1 bg-blue-50/40 border border-t-0 border-blue-100 rounded-b-xl p-2.5 overflow-y-auto space-y-2" id="col-DOING"
             ondragover="colDragOver(event)" ondragleave="colDragLeave(event)" ondrop="colDrop(event,'DOING')">
          <div id="add-form-DOING" class="hidden bg-white border-2 border-teal-400 rounded-lg p-2.5 space-y-2">
            <input id="add-title-DOING" type="text" placeholder="태스크 제목" class="w-full text-sm outline-none">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-1 text-xs text-teal-600">
                <span>담당자:</span>
                <span id="add-me-hint-DOING" class="font-medium">@me ▾</span>
              </div>
              <span class="text-xs text-gray-400">Enter 저장 · Esc 취소</span>
            </div>
          </div>
          <div class="drop-hint h-12 items-center justify-center border-2 border-dashed border-teal-300 rounded-lg text-teal-400 text-sm gap-1">↓ 여기에 놓기</div>
        </div>
      </div>

      <!-- DONE -->
      <div class="kanban-col flex-1 flex flex-col min-w-0 rounded-xl overflow-hidden" data-status="DONE">
        <div class="bg-teal-50 border border-teal-100 rounded-t-xl px-4 py-2.5 flex items-center justify-between flex-shrink-0">
          <span class="text-sm font-bold text-teal-700">DONE &nbsp;·&nbsp; <span id="count-DONE">0</span></span>
          <button class="text-teal-400 hover:text-teal-600 font-bold text-lg leading-none add-col-btn" data-col="DONE">+</button>
        </div>
        <div class="flex-1 bg-teal-50/40 border border-t-0 border-teal-100 rounded-b-xl p-2.5 overflow-y-auto space-y-2" id="col-DONE"
             ondragover="colDragOver(event)" ondragleave="colDragLeave(event)" ondrop="colDrop(event,'DONE')">
          <div id="add-form-DONE" class="hidden bg-white border-2 border-teal-400 rounded-lg p-2.5 space-y-2">
            <input id="add-title-DONE" type="text" placeholder="태스크 제목" class="w-full text-sm outline-none">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-1 text-xs text-teal-600">
                <span>담당자:</span>
                <span id="add-me-hint-DONE" class="font-medium">@me ▾</span>
              </div>
              <span class="text-xs text-gray-400">Enter 저장 · Esc 취소</span>
            </div>
          </div>
          <div class="drop-hint h-12 items-center justify-center border-2 border-dashed border-teal-300 rounded-lg text-teal-400 text-sm gap-1">↓ 여기에 놓기</div>
        </div>
      </div>

    </div>
  </section>

  <!-- 채팅 탭 -->
  <section id="tab-chat" class="hidden flex-1 flex flex-col overflow-hidden max-w-2xl mx-auto w-full">
    <div class="bg-white border-b border-gray-100 px-6 py-3 flex items-center justify-between flex-shrink-0">
      <span id="chatHeader" class="text-sm font-semibold text-gray-700"></span>
      <span class="text-xs text-teal-500 flex items-center gap-1">
        <span class="w-1.5 h-1.5 rounded-full bg-teal-400 inline-block"></span>
        5초마다 새로고침
      </span>
    </div>
    <div class="flex-1 overflow-y-auto px-6 py-4 space-y-3" id="chatMessages">
      <div id="chatEmpty" class="hidden text-center py-12">
        <p class="text-gray-400 text-sm">아직 대화가 없습니다</p>
        <p class="text-gray-400 text-xs mt-1">첫 메시지를 보내 팀원과 대화를 시작하세요</p>
      </div>
    </div>
    <div class="bg-white border-t border-gray-100 px-6 py-3 flex-shrink-0">
      <div class="flex gap-2">
        <input id="chatInput" type="text" placeholder="메시지 입력 (1000자 이내)..." maxlength="1000"
               class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
        <button id="sendBtn" class="bg-teal-600 hover:bg-teal-700 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition-colors">전송</button>
      </div>
      <div class="flex justify-end mt-1">
        <span id="charCount" class="text-xs text-gray-300">0 / 1000</span>
      </div>
    </div>
  </section>

  <!-- 멤버 탭 -->
  <section id="tab-member" class="hidden flex-1 overflow-y-auto max-w-lg mx-auto w-full px-6 py-6">
    <h3 id="memberCount" class="text-sm font-semibold text-gray-600 mb-4">팀 멤버</h3>
    <div id="memberList" class="space-y-2"></div>
    <div class="mt-6 p-4 bg-gray-50 rounded-xl border border-gray-100">
      <p class="text-xs text-gray-500 mb-1 font-medium">초대코드 공유</p>
      <div class="flex items-center gap-2">
        <span id="inviteCodeDisplay" class="font-mono text-lg font-bold text-gray-700 tracking-widest"></span>
        <button id="copyInviteBtn" class="text-xs text-teal-600 hover:underline">복사</button>
      </div>
      <p id="copyInviteMsg" class="text-xs text-teal-500 mt-1 h-4"></p>
    </div>
  </section>

  <!-- 카드 상세 모달 -->
  <div id="taskModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-[480px] p-6">
      <div class="flex items-start justify-between mb-5">
        <div class="flex-1 pr-4">
          <span id="modalTaskId" class="text-xs text-gray-400 font-mono"></span>
          <input id="modalTitle" type="text"
            class="block w-full text-lg font-bold text-gray-800 mt-0.5 border-b border-transparent hover:border-gray-200 focus:border-teal-400 focus:outline-none pb-0.5 bg-transparent">
        </div>
        <button id="modalClose" class="text-gray-400 hover:text-gray-600 text-xl leading-none flex-shrink-0">×</button>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-5">
        <div>
          <p class="text-xs text-gray-400 mb-1.5">상태</p>
          <div class="flex gap-1">
            <button class="status-btn text-xs px-2.5 py-1 rounded border" data-status="TODO">TODO</button>
            <button class="status-btn text-xs px-2.5 py-1 rounded border" data-status="DOING">DOING</button>
            <button class="status-btn text-xs px-2.5 py-1 rounded border" data-status="DONE">DONE</button>
          </div>
        </div>
        <div>
          <p class="text-xs text-gray-400 mb-1.5">담당자</p>
          <p id="assigneeText" class="text-sm font-medium text-gray-700"></p>
          <select id="modalAssignee" class="hidden w-full mt-1 px-2 py-1 rounded border border-gray-200 text-sm focus:outline-none focus:ring-1 focus:ring-teal-400">
            <option value="">미할당</option>
          </select>
        </div>
        <div>
          <p class="text-xs text-gray-400 mb-1.5">생성자</p>
          <p id="modalCreator" class="text-sm text-gray-700"></p>
        </div>
        <div>
          <p class="text-xs text-gray-400 mb-1.5">생성 시각</p>
          <p id="modalCreatedAt" class="text-sm text-gray-700"></p>
        </div>
      </div>

      <div class="flex gap-2">
        <button id="modalSave" class="flex-1 bg-teal-600 hover:bg-teal-700 text-white text-sm font-semibold py-2.5 rounded-lg transition-colors">저장</button>
        <button id="modalAssignBtn" class="px-4 text-sm text-gray-500 border border-gray-200 rounded-lg hover:bg-gray-50">다른 담당자 지정</button>
        <button id="modalDelete" class="px-4 text-sm text-red-500 border border-red-200 rounded-lg hover:bg-red-50">🗑 삭제</button>
      </div>
    </div>
  </div>

  <!-- 삭제 확인 모달 -->
  <div id="deleteModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl w-80 p-6 text-center">
      <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4 text-2xl">⚠️</div>
      <h4 class="font-bold text-gray-800 mb-1">이 카드를 삭제하시겠습니까?</h4>
      <p id="deleteModalMsg" class="text-sm text-gray-400 mb-6"></p>
      <div class="flex gap-2">
        <button id="deleteCancelBtn" class="flex-1 py-2.5 rounded-lg border border-gray-200 text-sm text-gray-600 hover:bg-gray-50">취소</button>
        <button id="deleteConfirmBtn" class="flex-1 py-2.5 rounded-lg bg-red-500 hover:bg-red-600 text-white text-sm font-semibold">삭제</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { apiFetch, getToken, getTeam, removeToken, removeTeam } from "./js/api.js";

    if (!getToken()) { window.location.href = "/static/login.html"; }
    const team = getTeam();
    if (!team) { window.location.href = "/static/team.html"; }

    const teamId = team.id;
    let currentUser = null;
    let allTasks = [];
    let currentFilter = "all";
    let selectedTask = null;
    let chatPollingInterval = null;
    let lastMessageTime = null;
    let teamMembers = [];

    const AVATAR_COLORS = ["bg-teal-500", "bg-orange-400", "bg-purple-400", "bg-blue-400", "bg-pink-400", "bg-indigo-400"];

    document.getElementById("teamName").textContent = team.name + " 팀";
    document.getElementById("chatHeader").textContent = team.name + " 팀 · 채팅";
    document.getElementById("inviteCodeDisplay").textContent = team.invite_code || "";

    apiFetch("/auth/me").then(r => r && r.json()).then(u => {
      if (!u) return;
      currentUser = u;
      document.getElementById("userEmail").textContent = u.email;
      const username = u.email.split("@")[0];
      ["TODO", "DOING", "DONE"].forEach(s => {
        const el = document.getElementById("add-me-hint-" + s);
        if (el) el.textContent = "@" + username + " ▾";
      });
    });

    // 탭 전환
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll(".tab-btn").forEach(b => {
          b.classList.remove("active");
          if (!b.classList.contains("active")) b.classList.add("text-gray-500");
        });
        btn.classList.add("active");
        btn.classList.remove("text-gray-500");

        ["kanban", "chat", "member"].forEach(t => {
          document.getElementById("tab-" + t).classList.toggle("hidden", t !== tab);
        });

        if (tab === "chat") startChatPolling();
        else stopChatPolling();
        if (tab === "member") loadMembers();
      });
    });

    // 필터
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        currentFilter = btn.dataset.filter;
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderTasks();
      });
    });

    // 인라인 추가 폼
    document.querySelectorAll(".add-col-btn").forEach(btn => {
      btn.addEventListener("click", () => openAddForm(btn.dataset.col));
    });

    function openAddForm(status) {
      const form = document.getElementById("add-form-" + status);
      form.classList.remove("hidden");
      document.getElementById("add-title-" + status).focus();
    }

    ["TODO", "DOING", "DONE"].forEach(status => {
      const input = document.getElementById("add-title-" + status);
      input.addEventListener("keydown", async e => {
        if (e.key === "Escape") {
          document.getElementById("add-form-" + status).classList.add("hidden");
          input.value = "";
          return;
        }
        if (e.key === "Enter") {
          const title = input.value.trim();
          if (!title) return;
          const res = await apiFetch(`/teams/${teamId}/tasks`, {
            method: "POST",
            body: JSON.stringify({ title, status }),
          });
          if (res && res.ok) {
            const task = await res.json();
            task.status = status;
            allTasks.unshift(task);
            renderTasks();
            input.value = "";
            document.getElementById("add-form-" + status).classList.add("hidden");
          }
        }
      });
    });

    // 태스크 로드
    async function loadTasks() {
      const res = await apiFetch(`/teams/${teamId}/tasks`);
      if (!res) return;
      allTasks = await res.json();
      renderTasks();
    }

    function renderTasks() {
      let filtered = allTasks;
      if (currentFilter === "me" && currentUser) {
        filtered = allTasks.filter(t => t.assignee_id === currentUser.id);
      } else if (currentFilter === "unassigned") {
        filtered = allTasks.filter(t => !t.assignee_id);
      }

      ["TODO", "DOING", "DONE"].forEach(status => {
        const col = document.getElementById("col-" + status);
        const tasks = filtered.filter(t => t.status === status);
        document.getElementById("count-" + status).textContent = tasks.length;

        const addForm = document.getElementById("add-form-" + status);
        const dropHint = col.querySelector(".drop-hint");
        col.innerHTML = "";
        col.appendChild(addForm);

        if (tasks.length === 0) {
          const emptyDiv = document.createElement("div");
          emptyDiv.className = "text-center py-6 text-gray-400 text-xs cursor-pointer hover:text-teal-500";
          emptyDiv.textContent = "+ 태스크 추가";
          emptyDiv.addEventListener("click", () => openAddForm(status));
          col.appendChild(emptyDiv);
        } else {
          tasks.forEach(task => col.appendChild(createTaskCard(task)));
        }

        col.appendChild(dropHint);
      });
    }

    function createTaskCard(task) {
      const isDone = task.status === "DONE";
      const card = document.createElement("div");
      card.className = "task-card bg-white border border-gray-100 rounded-lg px-3 py-2.5 cursor-grab shadow-sm hover:shadow-md transition-shadow" + (isDone ? " opacity-70" : "");
      card.draggable = true;
      card.dataset.taskId = task.id;

      const assigneeLabel = task.assignee_email ? "@" + task.assignee_email.split("@")[0] : "미할당";
      const d = new Date(task.created_at);
      const timeLabel = `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
      card.innerHTML = `
        <p class="text-sm font-medium ${isDone ? "text-gray-500 line-through" : "text-gray-800"}">${escapeHtml(task.title)}</p>
        <div class="flex items-center justify-between mt-1.5">
          <p class="text-xs text-gray-400">#${task.id} · ${escapeHtml(assigneeLabel)} · ${timeLabel}</p>
          <button class="card-del-btn text-gray-300 hover:text-red-400 text-sm leading-none ml-1 flex-shrink-0" title="삭제">🗑</button>
        </div>`;

      card.addEventListener("click", () => openTaskModal(task));

      card.querySelector(".card-del-btn").addEventListener("click", e => {
        e.stopPropagation();
        selectedTask = task;
        document.getElementById("deleteModalMsg").textContent =
          `'#${task.id} ${task.title}' — 되돌릴 수 없습니다`;
        document.getElementById("deleteModal").classList.remove("hidden");
      });

      card.addEventListener("dragstart", e => {
        e.dataTransfer.setData("taskId", String(task.id));
        e.dataTransfer.setData("fromStatus", task.status);
        setTimeout(() => card.classList.add("dragging"), 0);
      });
      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        document.querySelectorAll(".kanban-col").forEach(c => c.classList.remove("drag-over"));
      });
      return card;
    }

    // 드래그앤드롭 (inline handlers용 전역 노출)
    window.colDragOver = function(e) {
      e.preventDefault();
      e.currentTarget.closest(".kanban-col").classList.add("drag-over");
    };
    window.colDragLeave = function(e) {
      const col = e.currentTarget.closest(".kanban-col");
      if (!col.contains(e.relatedTarget)) col.classList.remove("drag-over");
    };
    window.colDrop = async function(e, status) {
      e.preventDefault();
      const col = e.currentTarget.closest(".kanban-col");
      col.classList.remove("drag-over");
      const taskId = e.dataTransfer.getData("taskId");
      const fromStatus = e.dataTransfer.getData("fromStatus");
      if (!taskId || fromStatus === status) return;

      const res = await apiFetch(`/tasks/${taskId}/status`, {
        method: "PATCH",
        body: JSON.stringify({ status }),
      });
      if (res && res.ok) {
        const updated = await res.json();
        allTasks = allTasks.map(t => t.id === updated.id ? updated : t);
        renderTasks();
      }
    };

    // 태스크 모달
    async function ensureMembers() {
      if (teamMembers.length > 0) return;
      const res = await apiFetch(`/teams/${teamId}/members`);
      if (res && res.ok) teamMembers = await res.json();
    }

    function updateStatusBtns(status) {
      document.querySelectorAll(".status-btn").forEach(btn => {
        const active = btn.dataset.status === status;
        btn.className = active
          ? "status-btn text-xs px-2.5 py-1 rounded border border-teal-500 bg-teal-500 text-white font-semibold"
          : "status-btn text-xs px-2.5 py-1 rounded border border-gray-200 text-gray-500 hover:bg-gray-50";
      });
    }

    async function openTaskModal(task) {
      selectedTask = task;
      await ensureMembers();

      document.getElementById("modalTaskId").textContent = "#" + task.id;
      document.getElementById("modalTitle").value = task.title;
      document.getElementById("modalCreator").textContent = task.creator_email || "-";
      document.getElementById("modalCreatedAt").textContent = new Date(task.created_at).toLocaleString("ko-KR");
      updateStatusBtns(task.status);

      const assigneeText = task.assignee_email
        ? (currentUser && task.assignee_id === currentUser.id
            ? "@me (" + task.assignee_email + ")"
            : task.assignee_email)
        : "미할당";
      document.getElementById("assigneeText").textContent = assigneeText;
      document.getElementById("modalAssignee").classList.add("hidden");

      const sel = document.getElementById("modalAssignee");
      sel.innerHTML = '<option value="">미할당</option>';
      teamMembers.forEach(m => {
        const opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = m.email;
        if (m.id === task.assignee_id) opt.selected = true;
        sel.appendChild(opt);
      });

      document.getElementById("taskModal").classList.remove("hidden");
    }

    // 상태 버튼 즉시 변경
    document.querySelectorAll(".status-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        if (!selectedTask || btn.dataset.status === selectedTask.status) return;
        const res = await apiFetch(`/tasks/${selectedTask.id}/status`, {
          method: "PATCH",
          body: JSON.stringify({ status: btn.dataset.status }),
        });
        if (res && res.ok) {
          const updated = await res.json();
          allTasks = allTasks.map(t => t.id === updated.id ? updated : t);
          selectedTask = updated;
          updateStatusBtns(updated.status);
          renderTasks();
        }
      });
    });

    document.getElementById("modalAssignBtn").addEventListener("click", () => {
      document.getElementById("modalAssignee").classList.toggle("hidden");
    });

    document.getElementById("modalClose").addEventListener("click", () => {
      document.getElementById("taskModal").classList.add("hidden");
    });

    document.getElementById("modalSave").addEventListener("click", async () => {
      const title = document.getElementById("modalTitle").value.trim();
      if (!title || !selectedTask) return;
      const sel = document.getElementById("modalAssignee");
      const body = { title };
      if (!sel.classList.contains("hidden")) {
        body.assignee_id = sel.value === "" ? null : parseInt(sel.value);
      }
      const res = await apiFetch(`/tasks/${selectedTask.id}`, {
        method: "PUT",
        body: JSON.stringify(body),
      });
      if (res && res.ok) {
        const updated = await res.json();
        allTasks = allTasks.map(t => t.id === updated.id ? updated : t);
        renderTasks();
        document.getElementById("taskModal").classList.add("hidden");
      }
    });

    document.getElementById("modalDelete").addEventListener("click", () => {
      document.getElementById("taskModal").classList.add("hidden");
      document.getElementById("deleteModalMsg").textContent =
        `'#${selectedTask.id} ${selectedTask.title}' — 되돌릴 수 없습니다`;
      document.getElementById("deleteModal").classList.remove("hidden");
    });

    document.getElementById("deleteCancelBtn").addEventListener("click", () => {
      document.getElementById("deleteModal").classList.add("hidden");
      document.getElementById("taskModal").classList.remove("hidden");
    });

    document.getElementById("deleteConfirmBtn").addEventListener("click", async () => {
      if (!selectedTask) return;
      const res = await apiFetch(`/tasks/${selectedTask.id}`, { method: "DELETE" });
      if (res && (res.ok || res.status === 204)) {
        allTasks = allTasks.filter(t => t.id !== selectedTask.id);
        renderTasks();
        document.getElementById("deleteModal").classList.add("hidden");
      }
    });

    // 채팅
    async function loadMessages(since = null) {
      const url = since ? `/teams/${teamId}/messages?since=${since}` : `/teams/${teamId}/messages`;
      const res = await apiFetch(url);
      if (!res) return;
      const messages = await res.json();
      const container = document.getElementById("chatMessages");
      const emptyEl = document.getElementById("chatEmpty");

      if (since) {
        if (messages.length > 0) {
          messages.forEach(m => appendMessage(m));
          lastMessageTime = messages[messages.length - 1].created_at;
        }
      } else {
        container.innerHTML = "";
        container.appendChild(emptyEl);
        if (messages.length === 0) {
          emptyEl.classList.remove("hidden");
        } else {
          emptyEl.classList.add("hidden");
          messages.forEach(m => appendMessage(m));
          lastMessageTime = messages[messages.length - 1].created_at;
          container.scrollTop = container.scrollHeight;
        }
      }
    }

    function appendMessage(msg) {
      document.getElementById("chatEmpty").classList.add("hidden");
      const container = document.getElementById("chatMessages");
      const isMe = currentUser && msg.user_id === currentUser.id;
      const label = isMe ? "나" : escapeHtml(msg.user_email.split("@")[0]);
      const time = new Date(msg.created_at).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
      const div = document.createElement("div");
      div.className = `flex flex-col gap-0.5 ${isMe ? "items-end" : "items-start"}`;
      div.innerHTML = `
        <span class="text-xs text-gray-400 px-1">${label} · ${time}</span>
        <div class="max-w-[75%] px-4 py-2.5 text-sm ${isMe ? "bg-teal-600 text-white rounded-xl rounded-tr-none" : "bg-white border border-gray-100 text-gray-700 rounded-xl rounded-tl-none shadow-sm"}">${escapeHtml(msg.content)}</div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    function startChatPolling() {
      loadMessages();
      chatPollingInterval = setInterval(() => loadMessages(lastMessageTime), 5000);
    }
    function stopChatPolling() {
      if (chatPollingInterval) { clearInterval(chatPollingInterval); chatPollingInterval = null; }
    }

    const chatInput = document.getElementById("chatInput");
    const charCount = document.getElementById("charCount");
    const sendBtn = document.getElementById("sendBtn");

    chatInput.addEventListener("input", () => {
      const len = chatInput.value.length;
      charCount.textContent = len + " / 1000";
      charCount.classList.toggle("text-red-500", len > 1000);
      charCount.classList.toggle("text-gray-300", len <= 1000);
      sendBtn.disabled = len > 1000;
      sendBtn.classList.toggle("opacity-50", len > 1000);
    });

    sendBtn.addEventListener("click", async () => {
      const content = chatInput.value.trim();
      if (!content || content.length > 1000) return;
      const res = await apiFetch(`/teams/${teamId}/messages`, {
        method: "POST",
        body: JSON.stringify({ content }),
      });
      if (res && res.ok) {
        const msg = await res.json();
        appendMessage(msg);
        lastMessageTime = msg.created_at;
        chatInput.value = "";
        charCount.textContent = "0 / 1000";
      }
    });

    chatInput.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); sendBtn.click(); }
    });

    // 멤버
    async function loadMembers() {
      const res = await apiFetch(`/teams/${teamId}/members`);
      if (!res) return;
      const members = await res.json();
      teamMembers = members;
      document.getElementById("memberCount").textContent = `팀 멤버 · ${members.length}명`;
      const list = document.getElementById("memberList");
      list.innerHTML = "";
      members.forEach((m, i) => {
        const initial = m.email.charAt(0).toUpperCase();
        const colorClass = AVATAR_COLORS[i % AVATAR_COLORS.length];
        const isMe = currentUser && m.id === currentUser.id;
        const div = document.createElement("div");
        div.className = "bg-white rounded-xl border border-gray-100 px-5 py-3 flex items-center gap-3";
        div.innerHTML = `
          <div class="w-8 h-8 rounded-full ${colorClass} flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${initial}</div>
          <div>
            <p class="text-sm font-medium text-gray-800">${escapeHtml(m.email)}${isMe ? " (나)" : ""}</p>
            <p class="text-xs text-gray-400">${m.role === "owner" ? "owner" : "member"}</p>
          </div>`;
        list.appendChild(div);
      });

      if (team.invite_code) {
        document.getElementById("inviteCodeDisplay").textContent = team.invite_code;
      }
    }

    document.getElementById("copyInviteBtn").addEventListener("click", () => {
      const code = document.getElementById("inviteCodeDisplay").textContent;
      if (!code) return;
      navigator.clipboard.writeText(code).then(() => {
        const msg = document.getElementById("copyInviteMsg");
        msg.textContent = "클립보드에 복사됐습니다!";
        setTimeout(() => { msg.textContent = ""; }, 2000);
      });
    });

    function escapeHtml(str) {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    loadTasks();
  </script>
</body>
</html>
